# @package _global_

loss:
  name: dynamic_bootstrap
  hparams:
    num_classes: ${dataset.num_labels}
    # class_weight: [0.8, 0.1, 0.25, 0.6, 0.9, 1.0]
    # class_weight: [0.8, 0.1, 0.25, 0.5, 0.75, 0.9, 1.0]
