defaults:
  - default
  - override hydra/sweeper: optuna # {optuna, basic}
  - override hydra/sweeper/sampler: tpe # {tpe, random, grid}

default_tags:
  - ${model.name}
  - ${dataset.name}
  - search_${now:%Y%m%d_%H%M%S}

#### Experiment params ########################################################
hydra:
  sweeper:
    direction: maximize
    n_trials: 200
    params:
      loss: dice_ce, dice_focal, general_dice_focal
      loss.hparams.pos_weight: range(1.0,5.0,step=1.0)
      loss.hparams.dice_w: range(0.0,1.0,step=0.1)
      dataset.channels: "[2,3,7], [3,6,7], [2,3,8], [3,6,8], [0,1,2,3,6,7,8]"
      lr_scheduler: cosine, exp, multistep, redplat
      optimizer: sgd, adam, adamW
      optimizer.hparams.lr: 5e-3, 1e-3, 5e-4, 1e-4, 5e-5